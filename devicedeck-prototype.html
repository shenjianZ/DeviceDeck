*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.showcase{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#08080a;background-image:radial-gradient(ellipse at 50% 0%,rgba(47,111,235,.07) 0%,transparent 55%);padding:32px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}

.frame-brand-dot{width:8px;height:8px;border-radius:50%;background:#2F6FEB}
.frame-sub{color:#52525b;font-size:13px;margin-bottom:20px}

.macbook{width:100%;max-width:1100px;position:relative}
.macbook-lid{position:relative;width:100%;aspect-ratio:1440/900;background:#1a1a1a;border-radius:16px 16px 3px 3px;padding:12px 12px 15px;box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 8px 40px rgba(0,0,0,.55)}

.macbook-display{width:100%;height:100%;border-radius:3px;overflow:hidden;position:relative}
.macbook-base{width:102%;margin-left:-1%;height:12px;margin-top:-1px;background:linear-gradient(to bottom,#b8b8bc,#9a9a9e 60%,#7a7a7e);border-radius:0 0 6px 6px;box-shadow:0 0 0 1px rgba(255,255,255,.3) inset,0 4px 12px rgba(0,0,0,.3);position:relative}

#root{width:100%;height:100%}

.app{width:100%;height:100%;display:flex;font-size:13px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overflow:hidden;transition:background .2s,color .2s}

.sb-item{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;color:var(--t2);transition:all .15s;position:relative;border:none;background:none}
.sb-item:hover{background:var(--bg-3);color:var(--t1)}
.sb-item.active{background:var(--acc-s);color:var(--acc)}
.sb-tip{display:none;position:absolute;left:44px;background:var(--bg-3);color:var(--t0);padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;z-index:99;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.sb-item:hover .sb-tip{display:block}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:42px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--bd);gap:10px;flex-shrink:0}
.topbar-title{font-weight:600;font-size:14px;flex:1}
.topbar-status{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t2)}
.topbar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.topbar-dot.ok{background:var(--ok)}.topbar-dot.err{background:var(--err)}
.topbar-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;border:none;background:none;color:var(--t2);transition:all .15s}
.topbar-btn:hover{background:var(--bg-3);color:var(--t1)}
.content{flex:1;overflow-y:auto;padding:16px 18px}

.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;transition:border-color .15s}

.card-val{font-size:26px;font-weight:700;letter-spacing:-.02em}

.badge.unknown{background:var(--bg-3);color:var(--t2)}.badge.unknown .badge-dot{background:var(--t2)}

.btn-p{background:var(--acc);color:#fff}.btn-p:hover{opacity:.88}

.toggle.on{background:var(--acc)}
.toggle::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}

.cap-tag.off{background:var(--bg-3);color:var(--t2);opacity:.5}
.mono{font-family:'SF Mono',ui-monospace,'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.row{display:flex;align-items:center;gap:8px}
.col{display:flex;flex-direction:column;gap:4px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--t2);gap:8px;font-size:13px;text-align:center}
.log-row{display:grid;grid-template-columns:70px 62px 52px 100px 1fr;gap:6px;padding:6px 8px;border-bottom:1px solid var(--bd);font-size:12px;align-items:center}
.log-row:hover{background:var(--bg-2)}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);gap:12px}
.setting-row:last-child{border-bottom:none}
.preset-card{cursor:pointer;border:1px solid var(--bd);border-radius:8px;padding:12px;transition:all .15s;background:var(--card)}

.preset-card.selected{border-color:var(--acc);background:var(--acc-s)}
.env-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--bd);background:var(--card)}
.env-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.action-bar{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.session-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--bd);border-radius:8px;background:var(--card)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:12px}
.detail-label{color:var(--t2)}.detail-val{color:var(--t0);font-weight:500}
.detail-notice{padding:10px 12px;border-radius:6px;font-size:12px;margin-top:8px;display:flex;align-items:center;gap:8px}

/* ═══ Dropdown ═══ */
function Dropdown({value,onChange,options,style,placeholder}){
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[open]);
  const sel=options.find(o=>o.value===value);
  return<div className="dd" ref={ref} style={style}>
    <button className="dd-trigger" onClick={()=>setOpen(!open)}>
      <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sel?.label||placeholder||'—'}</span>
      <span style={{transition:'transform .15s',color:'var(--t2)',display:'inline-flex',transform:open?'rotate(180deg)':'none'}}><Ic d={IC.chevron} s={14}/></span>
    </button>
    {open&&<div className="dd-panel">
      {options.map(o=><div key={o.value} className={"dd-opt"+(o.value===value?" act":"")} onClick={()=>{onChange(o.value);setOpen(false)}}>{o.label}{o.value===value&&<span style={{color:'var(--acc)',display:'inline-flex',marginLeft:8}}><Ic d={IC.check} s={13}/></span>}</div>)}
    </div>}
  </div>;
}

/* ═══ Mirror ═══ */
function MirrorPage({devices,sessions,onStart,onStop}){
  const [selPreset,setSelPreset]=useState(null);
  const [cfg,setCfg]=useState({maxSize:'1080',videoBitRate:'8M',maxFps:'60',noControl:false,stayAwake:true,turnScreenOff:false});
  const [selDevice,setSelDevice]=useState(devices.find(d=>d.status==='online')?.id||'');
  const onlineDevices=devices.filter(d=>d.status==='online');
  const devSerial=devices.find(d=>d.id===selDevice)?.serial;
  const runningForDevice=sessions.find(s=>s.status==='running'&&s.deviceSerial===devSerial);
  const [starting,setStarting]=useState(false);
  const applyPreset=(p)=>{setSelPreset(p.id);setCfg({...p.config})};
  const startMirror=()=>{if(!selDevice||runningForDevice)return;setStarting(true);setTimeout(()=>{onStart(selDevice,{...cfg});setStarting(false)},600)};
  return <div className="col" style={{gap:14}}>
    <div className="sec-title">选择设备</div>
    <Dropdown value={selDevice} onChange={v=>{setSelDevice(v);setSelPreset(null)}} options={[{value:'',label:'— 选择设备 —'},...onlineDevices.map(d=>({value:d.id,label:d.name+' ('+d.serial+')'}))]} style={{maxWidth:320}} placeholder="— 选择设备 —"/>
    {selDevice&&runningForDevice&&<div className="detail-notice" style={{background:'var(--wrn-s)',color:'var(--wrn)'}}><Ic d={IC.alert} s={14}/>该设备已有运行中的投屏会话</div>}
    <div className="sec-title">投屏预设</div>
    <div className="grid4">
      {PRESETS.map(p=>(<div key={p.id} className={`preset-card${selPreset===p.id?' selected':''}`} onClick={()=>applyPreset(p)}>
        <div style={{fontWeight:600,fontSize:12,marginBottom:2}}>{p.name}</div>
        <div style={{fontSize:11,color:'var(--t2)'}}>{p.desc}</div>
      </div>))}
    </div>
    <div className="sec-title">自定义配置</div>
    <div className="card">
      <div className="grid3" style={{marginBottom:10}}>
        <div className="col"><label style={{fontSize:11,color:'var(--t2)'}}>最大分辨率</label><Dropdown value={cfg.maxSize} onChange={v=>setCfg({...cfg,maxSize:v})} options={OPT_RES}/></div>
        <div className="col"><label style={{fontSize:11,color:'var(--t2)'}}>视频码率</label><Dropdown value={cfg.videoBitRate} onChange={v=>setCfg({...cfg,videoBitRate:v})} options={OPT_BR}/></div>
        <div className="col"><label style={{fontSize:11,color:'var(--t2)'}}>最大帧率</label><Dropdown value={cfg.maxFps} onChange={v=>setCfg({...cfg,maxFps:v})} options={OPT_FPS}/></div>
      </div>
      <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
        <div className="row"><button className={`toggle${cfg.noControl?' on':''}`} onClick={()=>setCfg({...cfg,noControl:!cfg.noControl})}/><span style={{fontSize:12}}>禁用控制</span></div>
        <div className="row"><button className={`toggle${cfg.stayAwake?' on':''}`} onClick={()=>setCfg({...cfg,stayAwake:!cfg.stayAwake})}/><span style={{fontSize:12}}>保持唤醒</span></div>
        <div className="row"><button className={`toggle${cfg.turnScreenOff?' on':''}`} onClick={()=>setCfg({...cfg,turnScreenOff:!cfg.turnScreenOff})}/><span style={{fontSize:12}}>关闭屏幕</span></div>
      </div>
    </div>
    <div className="row" style={{marginTop:4}}><button className="btn btn-p" disabled={!selDevice||!!runningForDevice||starting} onClick={startMirror}><Ic d={starting?IC.refresh:IC.play} s={14}/>{starting?'启动中...':'启动投屏'}</button></div>
    <div className="sec-title">活动会话</div>
    {sessions.length===0?<div className="empty"><Ic d={IC.monitor} s={28}/>暂无投屏会话</div>:sessions.map(s=>{
      const dev=devices.find(d=>d.serial===s.deviceSerial);
      return <div key={s.id} className="session-row">
        <span className={`badge ${s.status==='running'?'online':'offline'}`}><span className="badge-dot"/>{s.status==='running'?'运行中':'已停止'}</span>
        <span style={{fontWeight:500,fontSize:13}}>{dev?.name||s.deviceSerial}</span>
        <span className="mono" style={{fontSize:11,color:'var(--t2)'}}>PID {s.processId}</span>
        <span style={{fontSize:11,color:'var(--t2)'}}>{s.config.maxSize}p · {s.config.videoBitRate} · {s.config.maxFps}fps</span>
        <span style={{marginLeft:'auto',fontSize:11,color:'var(--t2)'}}>{Math.round((Date.now()-s.startedAt)/60000)} 分钟前</span>
        {s.status==='running'&&<button className="btn btn-d" style={{padding:'4px 10px',fontSize:11}} onClick={()=>onStop(s.id)}><Ic d={IC.stop} s={12}/>停止</button>}
      </div>;
    })}
  </div>;
}

/* ═══ Logs ═══ */

  const [srcFilter,setSrcFilter]=useState('all');

  const filtered=logs.filter(l=>(srcFilter==='all'||l.source===srcFilter)&&(lvlFilter==='all'||l.level===lvlFilter));
  const srcMap={system:'系统',adb:'ADB',scrcpy:'Scrcpy'};
  return <div className="col" style={{gap:10}}>
    <div className="action-bar">
      <Dropdown value={srcFilter} onChange={setSrcFilter} options={[{value:'all',label:'全部来源'},{value:'system',label:'系统'},{value:'adb',label:'ADB'},{value:'scrcpy',label:'Scrcpy'}]} style={{width:120}}/>
      <Dropdown value={lvlFilter} onChange={setLvlFilter} options={[{value:'all',label:'全部等级'},{value:'info',label:'Info'},{value:'warn',label:'Warn'},{value:'error',label:'Error'}]} style={{width:120}}/>
      <span style={{fontSize:11,color:'var(--t2)'}}>{filtered.length} 条日志</span>
      <button className="btn btn-g" style={{marginLeft:'auto'}} onClick={onClear}><Ic d={IC.x} s={13}/>清空</button>
    </div>
    <div style={{border:'1px solid var(--bd)',borderRadius:8,overflow:'hidden'}}>
      <div className="log-row" style={{background:'var(--bg-1)',fontWeight:600,fontSize:11,color:'var(--t2)'}}>
        <span>时间</span><span>来源</span><span>等级</span><span>设备</span><span>消息</span>
      </div>
      {filtered.length===0?<div className="empty" style={{padding:24}}>暂无日志</div>:filtered.map(l=>(
        <div key={l.id} className="log-row">
          <span className="mono" style={{fontSize:11,color:'var(--t2)'}}>{l.time.toLocaleTimeString('zh-CN',{hour12:false})}</span>
          <span className={`badge source-${l.source==='system'?'sys':l.source}`} style={{fontSize:10,padding:'1px 6px'}}>{srcMap[l.source]}</span>
          <span className={`badge level-${l.level}`} style={{fontSize:10,padding:'1px 6px'}}>{l.level.toUpperCase()}</span>
          <span className="mono" style={{fontSize:11,color:'var(--t2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.deviceSerial||'—'}</span>
          <span style={{fontSize:12}}>{l.message}</span>
        </div>
      ))}
    </div>
  </div>;
}

/* ═══ App Root ═══ */
const TITLES={dashboard:'仪表盘',devices:'设备管理',mirror:'投屏控制',logs:'运行日志',settings:'设置'};
function App(){
  const [page,setPage]=useState('dashboard');
  const [theme,setTheme]=useState('dark');
  const [devices]=useState(DEVICES);
  const [sessions,setSessions]=useState(INIT_SESSIONS);
  const [logs,setLogs]=useState(INIT_LOGS);
  const [selectedDeviceId,setSelectedDeviceId]=useState(null);
  const [settings,setSettings]=useState({useBundledAdb:true,useBundledScrcpy:false,customAdbPath:'C:\\platform-tools\\adb.exe',customScrcpyPath:'C:\\scrcpy\\scrcpy.exe',defaultMirrorConfig:{maxSize:'1080',videoBitRate:'8M',maxFps:'60',noControl:false,stayAwake:true,turnScreenOff:false},theme:'dark',logRetentionDays:7});
  const startMirror=useCallback((deviceId,cfg)=>{
    const dev=devices.find(d=>d.id===deviceId);if(!dev)return;
    const session={id:'s'+Date.now(),deviceSerial:dev.serial,platform:'android',processId:Math.floor(Math.random()*50000+10000),status:'running',startedAt:Date.now(),config:{...cfg}};
    setSessions(prev=>[...prev,session]);
    setLogs(prev=>[...prev,{id:'l'+Date.now(),time:new Date(),source:'scrcpy',level:'info',deviceSerial:dev.serial,message:`投屏已启动 — ${cfg.maxSize}p / ${cfg.videoBitRate} / ${cfg.maxFps}fps`}]);
  },[devices]);
  const stopMirror=useCallback((sessionId)=>{
    setSessions(prev=>prev.map(s=>s.id===sessionId?{...s,status:'stopped'}:s));
    const sess=sessions.find(s=>s.id===sessionId);
    if(sess){const dev=devices.find(d=>d.serial===sess.deviceSerial);setLogs(prev=>[...prev,{id:'l'+Date.now(),time:new Date(),source:'scrcpy',level:'info',deviceSerial:sess.deviceSerial,message:`${dev?.name||sess.deviceSerial} 投屏已停止`}]);}
  },[sessions,devices]);
  return <div className="app" data-theme={theme}>
    <Sidebar page={page} onNav={setPage}/>
    <div className="main">
      <Topbar title={TITLES[page]} theme={theme} onToggle={()=>setTheme(t=>t==='dark'?'light':'dark')}/>
      <div className="content">
        {page==='dashboard'&&<DashboardPage devices={devices} sessions={sessions} onNav={setPage}/>}
        {page==='devices'&&<DevicesPage devices={devices} selectedId={selectedDeviceId} onSelect={setSelectedDeviceId}/>}
        {page==='mirror'&&<MirrorPage devices={devices} sessions={sessions} onStart={startMirror} onStop={stopMirror}/>}
        {page==='logs'&&<LogsPage logs={logs} onClear={()=>setLogs([])}/>}
        {page==='settings'&&<SettingsPage settings={settings} onSave={setSettings}/>}
      </div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
